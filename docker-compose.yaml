include:
  - docker_base_image/compose.yaml
  - packages/drive/compose.yaml

services:
  ros-examples:
    image: ros_examples
    build:
      context: .
      dockerfile: ./ros_packages/examples/Dockerfile
    command: ros2 launch motors launch.py
    profiles:
      - demo
    networks:
      - pib-network
#???    extra_hosts:
#???      - "host.docker.internal:host-gateway"-
    restart: always

  drive:
    profiles:
      - all
    networks:
      - pib-network

volumes:
  programs:

networks:
  pib-network:
    driver: bridge

